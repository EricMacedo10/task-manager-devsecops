name: DevSecOps Pipeline

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Instalar Dependências
        run: pip install -r requirements.txt
        
      - name: Executar Testes Unitários
        run: python -m unittest discover || echo "[Aviso] Testes falharam ou ausentes."

      - name: Build Docker Image
        run: docker build -t task-manager-flask .

  sast_analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Bandit
        run: pip install bandit

      - name: Executar Bandit (SAST)
        run: bandit -r . -f html -o bandit-report.html || true

      - name: Salvar Relatório SAST
        uses: actions/upload-artifact@v3
        with:
          name: bandit-report
          path: bandit-report.html

  sca_analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Executar pip-audit (SCA)
        run: pip-audit -r requirements.txt || true

  dast_and_stage:
    runs-on: ubuntu-latest
    needs: [build_and_test]
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Subir Aplicação Localmente (Stage)
        run: |
          docker build -t task-manager-flask .
          docker-compose -f docker-compose.stage.yml up -d
          sleep 15

      - name: Executar OWASP ZAP (DAST)
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run -t --network host ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:8080 -I || true
